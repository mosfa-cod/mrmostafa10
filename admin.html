 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <!-- ... (نفس الستايل السابق) ... -->
</head>
<body>
    <div class="card" id="loginSection">
        <input type="email" id="emailInput" placeholder="البريد">
        <input type="password" id="passwordInput" placeholder="الباسورد">
        <button id="loginBtn">تسجيل الدخول</button>
    </div>

    <!-- ... (بقية الأقسام) ... --> <!-- استدعاء مكتبات Firebase بالطريقة التقليدية المتوافقة مع المتصفحات -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // استخدام الإعدادات الموجودة في ملفك القديم
    // تأكد أن ملف firebase-config.js يرفع المتغيرات على الـ window أو قم بنسخ الـ firebaseConfig هنا مباشرة إذا استمر الخطأ
    
    document.getElementById('loginBtn').addEventListener('click', (e) => {
        e.preventDefault(); 
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passwordInput').value;

        // طريقة تسجيل الدخول المتوافقة والسهلة
        firebase.auth().signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                alert("تم تسجيل الدخول بنجاح!");
                // هنا يظهر محتوى لوحة التحكم
                document.getElementById('loginSection').style.display = 'block';
            })
            .catch((error) => {
                alert("خطأ في تسجيل الدخول: " + error.message);
            });
    });
</script>


</body>
</html>
