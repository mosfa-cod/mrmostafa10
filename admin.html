 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <!-- ... (نفس الستايل السابق) ... -->
</head>
<body>
    <div class="card" id="loginSection">
        <input type="email" id="emailInput" placeholder="البريد">
        <input type="password" id="passwordInput" placeholder="الباسورد">
        <button id="loginBtn">تسجيل الدخول</button>
    </div>

    <!-- ... (بقية الأقسام) ... -->

    <script type="module">
        import { auth, db } from './firebase-config.js'; // تأكد أن المسار صحيح
        import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // استخدام addEventListener بدلاً من onclick
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        });

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loginSection').style.display = user ? 'none' : 'block';
        });
    </script>
</body>
</html>
