 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المسؤول</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .danger-zone { border: 1px solid #ef4444; background: #fef2f2; padding: 15px; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginSection">
        <h2>دخول المسؤول</h2>
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني">
        <input type="password" id="passwordInput" placeholder="كلمة المرور">
        <button onclick="loginAdmin()">تسجيل الدخول</button>
    </div>

    <div class="card" id="adminSection" style="display: none;">
        <h2>لوحة التحكم 🛠️</h2>
        <!-- إضافة مادة -->
        <input type="text" id="subjectTitle" placeholder="اسم المادة">
        <textarea id="subjectDesc" placeholder="وصف المادة"></textarea>
        <button onclick="addSubject()">حفظ المادة</button>

        <div class="danger-zone">
            <h3 style="color: #ef4444; margin-top: 0;">منطقة التنظيف</h3>
            <button onclick="clearCollection('subjects')" style="background-color: #dc2626; margin-bottom: 5px;">مسح المواد 🗑️</button>
            <button onclick="clearCollection('challenges')" style="background-color: #b91c1c; margin-bottom: 5px;">مسح التحديات 🗑️</button>
            <button onclick="clearCollection('testimonials')" style="background-color: #991b1b;">مسح الآراء 🗑️</button>
        </div>

        <button style="background: #6b7280; margin-top: 10px;" onclick="logoutAdmin()">تسجيل الخروج</button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // تسجيل الدخول
        window.loginAdmin = () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            signInWithEmailAndPassword(auth, email, pass)
                .catch(e => alert("خطأ في الدخول: " + e.message));
        };

        // المسح العام
        window.clearCollection = async (colName) => {
            if (confirm(`هل أنت متأكد من مسح ${colName}؟`)) {
                const snap = await getDocs(collection(db, colName));
                snap.forEach(d => deleteDoc(doc(db, colName, d.id)));
                alert("تم التنظيف بنجاح!");
            }
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loginSection').style.display = user ? 'none' : 'block';
            document.getElementById('adminSection').style.display = user ? 'block' : 'none';
        });

        window.logoutAdmin = () => signOut(auth);
        
        window.addSubject = async () => {
            await addDoc(collection(db, "subjects"), {
                title: document.getElementById('subjectTitle').value,
                desc: document.getElementById('subjectDesc').value,
                createdAt: serverTimestamp()
            });
            alert('تم الحفظ!');
        };
    </script>
</body>
</html>
