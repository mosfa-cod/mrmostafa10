 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <!-- ... (نفس الستايل السابق) ... -->
</head>
<body>
    <div class="card" id="loginSection">
        <input type="email" id="emailInput" placeholder="البريد">
        <input type="password" id="passwordInput" placeholder="الباسورد">
        <button id="loginBtn">تسجيل الدخول</button>
    </div>

    <!-- ... (بقية الأقسام) ... -->
 <script type="module">
import { auth, db } from './firebase-config.js';
import { 
  signInWithEmailAndPassword, 
  onAuthStateChanged 
} from "https://gstatic.com";
import { 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc 
} from "https://gstatic.com";




    // تفعيل عمل الزر بشكل صحيح دون إعادة تحميل الصفحة
    document.getElementById('loginBtn').addEventListener('click', (e) => {
        e.preventDefault(); // منع الصفحة من التحديث التلقائي واختفاء الأخطاء
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passwordInput').value;

        signInWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                alert("تم تسجيل الدخول بنجاح!");
            })
            .catch((error) => {
                alert("خطأ في تسجيل الدخول: " + error.message);
            });
    });

    // تعديل الشرط لتبديل الواجهات بدلاً من إخفاء الصفحة بالكامل
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // هنا تكتب كود إظهار لوحة التحكم بعد تسجيل الدخول بنجاح
            document.getElementById('loginSection').style.display = 'block'; 
        } else {
            document.getElementById('loginSection').style.display = 'block';
        }
    });
</script>

</body>
</html>
