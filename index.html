 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الأستاذ مصطفى عبد العال دحروج</title>
  <style>
    :root{ --primary:#7c3aed; --primary-dark:#5b21b6; --bg:#fff; --bg-soft:#f4f4f9; --text:#1f2937; --card-bg:#fff; }
    [data-mode="dark"]{ --bg:#0f172a; --bg-soft:#1e293b; --text:#e2e8f0; --card-bg:#1e293b; }
    [data-theme="blue"]{ --primary:#2563eb; --primary-dark:#1e40af; }
    [data-theme="green"]{ --primary:#16a34a; --primary-dark:#15803d; }
    *{box-sizing:border-box} body{font-family:'Tahoma',sans-serif;margin:0;background:var(--bg);color:var(--text);transition:.3s}
    nav{background:var(--primary);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    nav h1{font-size:20px;margin:0}
    .theme-controls{display:flex;align-items:center;gap:10px}
    .mode-toggle{background:#fff;border:none;color:var(--primary);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px}
    .color-dot{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer}
    .dot-purple{background:#7c3aed}.dot-blue{background:#2563eb}.dot-green{background:#16a34a}
    section{padding:40px 24px;max-width:1100px;margin:auto}
    h2{color:var(--primary);text-align:center}
    .subjects-grid,.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:24px}
    .subject-card,.testimonial-card{background:var(--card-bg);border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:transform .2s}
    .subject-card:hover{transform:translateY(-6px)}
    .subject-icon{font-size:40px}.subject-title{color:var(--primary);margin:10px 0}
    .subject-stats{display:flex;gap:14px;margin-top:12px;font-size:14px;opacity:.8}
    .challenge-card{background:var(--primary);color:#fff;border-radius:16px;padding:24px;text-align:center;max-width:420px;margin:24px auto}
    .challenge-points{font-size:22px;font-weight:bold;margin-top:10px}
    .testimonial-stars{color:#f59e0b;font-size:20px}
    .testimonial-author{display:flex;align-items:center;gap:12px;margin-top:14px}
    .author-avatar{width:46px;height:46px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px}
    .author-info{display:flex;flex-direction:column}.author-name{font-weight:bold}.author-role{font-size:13px;opacity:.7}
   /* إضافة حركية ناعمة لجميع العناصر */
* {
    transition: background-color 0.4s ease, color 0.4s ease, transform 0.2s ease;
}

/* تحسين شكل الأيقونات والبطاقات */
.subject-card, .testimonial-card {
    border: 1px solid rgba(0,0,0,0.05);
    backdrop-filter: blur(10px); /* لمسة Glassmorphism بسيطة */
}
  </style>
</head>
<body>
  <nav>
    <h1>الأستاذ مصطفى عبد العال دحروج</h1>
    <div class="theme-controls">
      <button id="modeToggle" class="mode-toggle">🌙</button>
      <span class="color-dot dot-purple" data-theme="purple"></span>
      <span class="color-dot dot-blue" data-theme="blue"></span>
      <span class="color-dot dot-green" data-theme="green"></span>
    </div>
  </nav>

  <section>
    <h2>المواد التعليمية</h2>
    <div class="subjects-grid" id="subjects-grid"></div>
  </section>

  <section>
    <h2>تحدي اليوم</h2>
    <div class="challenge-card" id="challenge-card"></div>
  </section>

  <section>
    <h2>ماذا يقول أولياء الأمور؟</h2>
    <div class="testimonials-grid" id="testimonials-grid"></div>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
